<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body { width: 320px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .logo { font-weight: 700; color: #059669; font-size: 18px; }
    .subtitle { font-size: 12px; color: #6b7280; }
    .card { background: #f9fafb; border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #e5e7eb; }
    .card-title { font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; margin-bottom: 8px;
    }
    button {
      width: 100%; padding: 8px; border-radius: 6px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-primary { background: #059669; color: white; }
    .btn-primary:hover { background: #047857; }
    .btn-secondary { background: white; color: #374151; border: 1px solid #d1d5db; margin-top: 6px; }
    .status { font-size: 11px; color: #6b7280; margin-top: 8px; text-align: center; }
    .success { color: #059669; }
    .error { color: #ef4444; }
    .link { color: #059669; text-decoration: none; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="logo">WACC</div>
      <div class="subtitle">WhatsApp Command Centre</div>
    </div>
  </div>

  <div id="login-section">
    <div class="card">
      <div class="card-title">Sign In</div>
      <input type="text" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <button class="btn-primary" id="login-btn">Sign In</button>
      <div class="status" id="login-status"></div>
    </div>
    <div style="text-align:center; margin-top:8px">
      <a href="http://localhost:5173" target="_blank" class="link">Open Dashboard</a>
    </div>
  </div>

  <div id="connected-section" style="display:none">
    <div class="card">
      <div class="card-title">Connected</div>
      <p class="status success" id="user-name"></p>
      <p class="status" id="tenant-info"></p>
      <button class="btn-secondary" id="logout-btn">Disconnect</button>
    </div>
    <div style="text-align:center; margin-top:8px">
      <a href="http://localhost:5173" target="_blank" class="link">Open Dashboard</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
